{% extends "base.html" %}

{% block content %}
<section class="login-card">
  <p class="login-appname">Connect to CS</p>
  <p class="login-subtitle">Sign in to the Commvault operational workspace.</p>
  {% if base_url %}
    <p class="helper-text" style="text-align:center;margin-bottom:1rem">{{ base_url }}</p>
  {% else %}
    <p class="helper-text" style="text-align:center;margin-bottom:1rem">CV_BASE_URL is not configured.</p>
  {% endif %}
  {% if error %}
    <p class="error">{{ error }}</p>
  {% endif %}
  <form method="post" action="{{ url_for('main.login') }}">
    <input type="hidden" name="next" value="{{ next_url }}">
    <div>
      <label for="username">Username</label>
      <input id="username" name="username" type="text" autocomplete="username" required>
    </div>
    <div>
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="login-submit">Connect</button>
  </form>
</section>
{% endblock %}
