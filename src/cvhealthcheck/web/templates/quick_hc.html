<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quick HC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='quick_hc.css') }}">
  <script>
    window.QUICK_HC_INITIAL_DATA = {{ initial_data | tojson }};
  </script>
</head>
<body>

<header class="hdr">
  <span class="hdr-title" onclick="showOverview()">Quick HC</span>
  <span class="hdr-sep"></span>
  <span id="hdr-subtitle" style="font-family:var(--mono);font-size:11px;color:var(--text-2)"></span>
  <span class="hdr-spacer"></span>
  <span class="hdr-avail" id="hdr-avail"></span>
  <a href="{{ url_for('main.index') }}" class="btn-ghost">← Dashboard</a>
</header>

<div class="body">
  <aside class="left">
    <div class="left-scroll" id="left-scroll"></div>
    <div class="left-footer">
      <button class="btn-gen" id="btn-gen">⬇ Generate Customer Report</button>
    </div>
  </aside>
  <main class="right">
    <div class="right-body" id="right-body"></div>
    <footer class="right-footer" id="right-footer">
      <span class="rf-source" id="rf-source"></span>
      <a class="rf-link" id="rf-link" href="#">Open full details →</a>
    </footer>
  </main>
</div>

<form id="report-form" method="post" action="{{ url_for('main.quick_hc_report') }}" style="display:none"></form>

<script src="{{ url_for('static', filename='quick_hc.js') }}"></script>
</body>
</html>
